<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering вҖ” Architecture Reference</title>

<!-- Marked.js for Markdown -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<!-- Highlight.js for syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>

<style>
/* в”Җв”Җ Claude Design System в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:          #1a1915;
  --bg-card:     #211f1b;
  --bg-elevated: #2a2820;
  --bg-code:     #161614;
  --border:      rgba(255,255,255,0.07);
  --border-soft: rgba(255,255,255,0.04);

  --text-primary:   #f0ece3;
  --text-secondary: #9b9485;
  --text-muted:     #5e5a52;

  --accent:       #cc785c;      /* Claude orange-terracotta */
  --accent-warm:  #d4956e;
  --accent-glow:  rgba(204,120,92,0.15);
  --accent-dim:   rgba(204,120,92,0.08);

  --sys1: #cc785c;   /* PyTorch вҖ” terracotta */
  --sys2: #5c9ecc;   /* vLLM вҖ” steel blue */
  --sys3: #7acc78;   /* LangChain вҖ” sage green */
  --sys4: #cc9d5c;   /* HuggingFace вҖ” amber */
  --sys5: #a07acc;   /* Research Lab вҖ” lavender */

  --sidebar-w: 300px;
  --header-h:  64px;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-display: 'Crimson Pro', Georgia, serif;
  --radius: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* в”Җв”Җ Scrollbar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* в”Җв”Җ Layout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  min-height: 100vh;
}

/* в”Җв”Җ Header в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
header {
  grid-column: 1 / -1;
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 16px;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-size: 16px;
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

.header-sep { flex: 1; }

.header-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* в”Җв”Җ Sidebar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
aside {
  width: var(--sidebar-w);
  border-right: 1px solid var(--border);
  position: sticky;
  top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto;
  padding: 20px 0;
  background: var(--bg);
  flex-shrink: 0;
}

.sidebar-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 20px 12px;
}

.system-btn {
  display: block;
  width: 100%;
  padding: 12px 20px;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s;
  position: relative;
}

.system-btn:hover { background: var(--bg-elevated); }

.system-btn.active {
  background: var(--accent-dim);
}

.system-btn.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  bottom: 4px;
  width: 2px;
  border-radius: 0 2px 2px 0;
  background: var(--btn-color, var(--accent));
}

.btn-icon {
  font-size: 18px;
  line-height: 1;
  display: block;
  margin-bottom: 4px;
}

.btn-title {
  font-family: var(--font-body);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-primary);
  display: block;
  margin-bottom: 3px;
}

.btn-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1.4;
  display: block;
}

.sidebar-divider {
  height: 1px;
  background: var(--border-soft);
  margin: 8px 20px;
}

/* TOC inside sidebar */
.toc-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 16px 20px 8px;
}

.toc-item {
  display: block;
  padding: 4px 20px 4px 28px;
  font-size: 12.5px;
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.1s;
  line-height: 1.4;
}
.toc-item:hover { color: var(--text-primary); }
.toc-item.h3 { padding-left: 36px; font-size: 11.5px; color: var(--text-muted); }

/* в”Җв”Җ Main Content в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
main {
  overflow-y: auto;
  height: calc(100vh - var(--header-h));
  padding: 48px 60px;
  max-width: 1100px;
}

/* в”Җв”Җ System Hero в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.system-hero {
  margin-bottom: 48px;
  padding-bottom: 36px;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--hero-color, var(--accent));
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.hero-eyebrow::after {
  content: '';
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: var(--hero-color, var(--accent));
  opacity: 0.4;
}

.hero-title {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 300;
  line-height: 1.1;
  color: var(--text-primary);
  letter-spacing: -1px;
  margin-bottom: 16px;
}

.hero-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 640px;
  font-family: var(--font-mono);
}

.hero-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 20px;
}

.hero-tag {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* в”Җв”Җ Markdown Rendered Content в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.md-content h1 {
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 300;
  color: var(--text-primary);
  margin: 56px 0 20px;
  letter-spacing: -0.8px;
  line-height: 1.15;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.md-content h1:first-child { margin-top: 0; }

.md-content h2 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 400;
  color: var(--text-primary);
  margin: 44px 0 14px;
  letter-spacing: -0.4px;
  line-height: 1.2;
}

.md-content h3 {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  color: var(--accent-warm);
  margin: 32px 0 10px;
  letter-spacing: 0.1px;
}

.md-content h4 {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin: 24px 0 8px;
}

.md-content p {
  color: var(--text-secondary);
  margin-bottom: 16px;
  font-size: 15px;
  line-height: 1.75;
}

.md-content strong { color: var(--text-primary); font-weight: 600; }
.md-content em { color: var(--text-secondary); font-style: italic; }

.md-content a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(204,120,92,0.3);
}
.md-content a:hover { border-color: var(--accent); }

.md-content blockquote {
  border-left: 2px solid var(--accent);
  padding: 2px 0 2px 20px;
  margin: 20px 0;
  color: var(--text-muted);
  font-style: italic;
}

.md-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 36px 0;
}

/* в”Җв”Җ Code Blocks в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.md-content pre {
  background: var(--bg-code) !important;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  overflow-x: auto;
  margin: 20px 0;
  position: relative;
}

.md-content pre code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.7;
  background: none !important;
  padding: 0 !important;
  border: none !important;
  color: #c9d1d9;
}

/* Architecture diagram blocks (plain text / ASCII) */
.md-content pre:not(.hljs-wrapper) code.language-undefined,
.md-content pre code:not([class]) {
  color: #8b9dc3;
}

.md-content code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  background: var(--bg-elevated);
  color: var(--accent-warm);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

/* в”Җв”Җ Tables в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.md-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 13.5px;
}

.md-content th {
  background: var(--bg-elevated);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.md-content td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border-soft);
  color: var(--text-secondary);
  vertical-align: top;
}

.md-content tr:last-child td { border-bottom: none; }
.md-content td code { font-size: 11.5px; }

/* в”Җв”Җ Lists в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.md-content ul, .md-content ol {
  margin: 12px 0 16px 20px;
  color: var(--text-secondary);
}

.md-content li {
  margin-bottom: 6px;
  line-height: 1.65;
  font-size: 14.5px;
}

.md-content li::marker { color: var(--text-muted); }

/* в”Җв”Җ Project Card в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.project-divider {
  margin: 48px 0;
  display: flex;
  align-items: center;
  gap: 16px;
}

.project-divider::before,
.project-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.project-divider span {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* в”Җв”Җ Welcome Screen в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.welcome {
  max-width: 720px;
  padding: 40px 0;
}

.welcome-title {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -2px;
  color: var(--text-primary);
  margin-bottom: 24px;
}

.welcome-title em {
  color: var(--accent);
  font-style: italic;
}

.welcome-body {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.75;
  margin-bottom: 40px;
}

.system-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 40px;
}

.system-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
  text-align: left;
}

.system-card:hover {
  background: var(--bg-elevated);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}

.card-icon { font-size: 24px; margin-bottom: 10px; display: block; }
.card-title {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.card-count {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-muted);
}
.card-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  line-height: 1.4;
}

.stat-row {
  display: flex;
  gap: 32px;
  margin: 32px 0;
  padding: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.stat { text-align: center; }
.stat-num {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 600;
  color: var(--accent);
  display: block;
  letter-spacing: -1px;
}
.stat-lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

<script>const BOOK_DATA = [{"title": "Mini PyTorch", "subtitle": "Autograd В· MatMul Kernel В· Softmax В· Transformer В· Flash Attention В· ViT В· Diffusion", "icon": "рҹ”Ҙ", "content": "# Mini PyTorch вҖ” E2E Architecture Reference\n> Projects: Autograd Engine В· Matrix Multiplication Kernel В· Softmax Kernel В· Transformer from Scratch В· Flash Attention Kernel В· Vision Transformer В· Diffusion Model (UNet + Scheduler)\n\n---\n\n## What You're Building\n\nA ground-up implementation of the compute stack that trains neural networks: automatic differentiation, hand-written GPU kernels, and the core architectures that define modern deep learning. After completing this system you will understand exactly what `loss.backward()` does, why Flash Attention exists, and how images can be generated from pure noise.\n\n---\n\n## Project 1 вҖ” Autograd Engine (like Micrograd)\n\n### Conceptual Architecture\n\nThe autograd engine is a **lazy computation graph** where every operation records how to undo itself. Forward pass builds the graph; backward pass walks it in reverse to propagate gradients.\n\n```\nFORWARD PASS\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n  User code:                  Graph built behind the scenes:\n  \n  x = Value(2.0)              x (data=2.0, grad=0)\n  w = Value(-3.0)             w (data=-3.0, grad=0)\n  b = Value(5.0)              b (data=5.0, grad=0)\n  n = x*w + b                     в”Ӯ\n  loss = n.tanh()             n=x*w+b вҶ’ loss=tanh(n)\n\nBACKWARD PASS\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n  loss.backward()\n  \n  Step 1: Topological sort (DFS, reverse postorder)\n          [x, w, b, x*w, n, loss]  вҶҗ evaluation order\n          reversed = [loss, n, x*w, b, w, x]\n  \n  Step 2: Set loss.grad = 1.0\n  \n  Step 3: For each node in reverse topo order:\n          call node._backward()  вҶҗ closure set during forward\n  \n  Example _backward for multiplication (n = x * w):\n      x.grad += w.data * n.grad\n      w.grad += x.data * n.grad\n```\n\n### Data Structure\n\n```python\nclass Value:\n    def __init__(self, data):\n        self.data   = float(data)    # actual value\n        self.grad   = 0.0            # вҲӮloss/вҲӮself, accumulates\n        self._backward = lambda: None  # filled in by ops\n        self._prev  = set()          # parent nodes (for graph)\n\n    def __mul__(self, other):\n        out = Value(self.data * other.data, (self, other))\n        \n        def _backward():\n            self.grad  += other.data * out.grad   # chain rule\n            other.grad += self.data  * out.grad\n        \n        out._backward = _backward\n        return out\n    \n    def backward(self):\n        topo = []\n        visited = set()\n        def build(v):\n            if v not in visited:\n                visited.add(v)\n                for child in v._prev: build(child)\n                topo.append(v)\n        build(self)\n        self.grad = 1.0\n        for node in reversed(topo):\n            node._backward()\n```\n\n### Operations to Implement\n\n| Op | Forward | Backward |\n|----|---------|----------|\n| add | `a + b` | `da += dout`, `db += dout` |\n| mul | `a * b` | `da += b*dout`, `db += a*dout` |\n| pow | `a^k` | `da += k*a^(k-1)*dout` |\n| relu | `max(0, a)` | `da += (a>0)*dout` |\n| tanh | `tanh(a)` | `da += (1-tanhВІ(a))*dout` |\n| exp | `e^a` | `da += e^a * dout` |\n| log | `ln(a)` | `da += (1/a)*dout` |\n\n### Training Loop\n\n```\nfor epoch in range(epochs):\n    # Forward\n    ypred = [model(x) for x in X_train]\n    loss  = mean_squared_error(ypred, Y_train)\n    \n    # Zero gradients (must reset each step вҖ” grads accumulate)\n    for p in model.parameters():\n        p.grad = 0.0\n    \n    # Backward\n    loss.backward()\n    \n    # Update (SGD)\n    for p in model.parameters():\n        p.data -= lr * p.grad\n```\n\n### Extension to Tensors\n\nReplace `float` with `np.ndarray`. The `_backward` closures become vectorized operations. Most ops remain identical; broadcasting rules must be handled by summing gradients along broadcasted dims.\n\n### Common Gotchas\n\n- **Gradient accumulation**: `grad +=` not `grad =` вҖ” same node can receive grad from multiple paths\n- **In-place ops**: Break the graph; avoid or clone before modifying\n- **Non-leaf grads**: Usually don't need to be stored (set `requires_grad=False` for efficiency)\n- **Numerical check**: Finite difference verification вҖ” `(f(x+h) - f(x-h)) / 2h вүҲ grad`\n\n---\n\n## Project 2 вҖ” Matrix Multiplication Kernel (CUDA)\n\n### Problem Statement\n\nCompute `C = A @ B` where A is (M,K), B is (K,N), C is (M,N). This is the dominant operation in transformer inference and training.\n\n### Level 1 вҖ” Naive Kernel\n\n```\nGrid:  dim3(ceil(N/32), ceil(M/32))      вҶҗ 2D grid of thread blocks\nBlock: dim3(32, 32)                       вҶҗ 1024 threads per block\n\nEach thread (row, col) computes one output element:\n  float acc = 0;\n  for (int k = 0; k < K; k++)\n      acc += A[row*K + k] * B[k*N + col];\n  C[row*N + col] = acc;\n\nProblem: Each output element reads K values from GLOBAL memory (HBM)\n         HBM bandwidth вүҲ 2 TB/s, latency вүҲ 400 cycles\n         Compute intensity too low вҶ’ memory bound\n```\n\n### Level 2 вҖ” Shared Memory Tiling\n\n```\nTILE = 32\n\nEach block is responsible for a (TILE Г— TILE) output tile\n\n__shared__ float As[TILE][TILE];\n__shared__ float Bs[TILE][TILE];\n\nfloat acc = 0.0;\nfor (int t = 0; t < K/TILE; t++) {\n    // Cooperatively load tile of A and B into SRAM\n    As[ty][tx] = A[row * K + (t*TILE + tx)];\n    Bs[ty][tx] = B[(t*TILE + ty) * N + col];\n    __syncthreads();\n    \n    // Compute on fast shared memory\n    for (int k = 0; k < TILE; k++)\n        acc += As[ty][k] * Bs[k][tx];\n    __syncthreads();\n}\nC[row*N + col] = acc;\n\nHBM reads reduced: O(M*N*K) вҶ’ O(M*N*K / TILE)\nSRAM bandwidth: ~19 TB/s (10x faster than HBM)\n```\n\n### Level 3 вҖ” Register Blocking + Vectorized Loads\n\n```\nEach thread owns a (Rv Г— Rc) = (8 Г— 8) output tile in REGISTERS\nThreads per block: TILE/Rv Г— TILE/Rc\n\nLoad with float4 (128-bit):\n  float4 a4 = *reinterpret_cast<float4*>(&A[...]);\n  вҶ’ 4 floats in 1 memory transaction (4x bandwidth utilization)\n\nDouble buffering:\n  While computing tile[t], prefetch tile[t+1] into second shared mem buffer\n  Hides memory latency with compute\n  \nAchieved performance: ~60-70% of peak FLOPS\n```\n\n### Level 4 вҖ” Tensor Cores (Warp Matrix Multiply)\n\n```\nUses CUDA's wmma (Warp Matrix Multiply Accumulate) API\nOperates on 16Г—16Г—16 matrix fragments in FP16\n\nwmma::fragment<wmma::matrix_a, 16,16,16, half> a_frag;\nwmma::fragment<wmma::matrix_b, 16,16,16, half> b_frag;\nwmma::fragment<wmma::accumulator, 16,16,16, float> c_frag;\n\nwmma::fill_fragment(c_frag, 0.0f);\nwmma::load_matrix_sync(a_frag, A_ptr, K);\nwmma::load_matrix_sync(b_frag, B_ptr, N);\nwmma::mma_sync(c_frag, a_frag, b_frag, c_frag);  вҶҗ single instruction\nwmma::store_matrix_sync(C_ptr, c_frag, N, wmma::mem_row_major);\n\nA100 Tensor Core peak: 312 TFLOPS (FP16), 77 TFLOPS (FP32)\ncuBLAS achieves ~80% of peak via highly tuned tile sizes + scheduling\n```\n\n### Full Pipeline\n\n```\nHost Setup:\n  cudaMalloc(&d_A, M*K*sizeof(float))\n  cudaMalloc(&d_B, K*N*sizeof(float))\n  cudaMalloc(&d_C, M*N*sizeof(float))\n  \n  cudaMemcpy(d_A, h_A, M*K*sizeof(float), cudaMemcpyHostToDevice)\n  cudaMemcpy(d_B, h_B, K*N*sizeof(float), cudaMemcpyHostToDevice)\n\nKernel Launch:\n  dim3 gridDim(ceil(N/TILE), ceil(M/TILE))\n  dim3 blockDim(TILE, TILE)\n  matmul_kernel<<<gridDim, blockDim>>>(d_A, d_B, d_C, M, N, K)\n  cudaDeviceSynchronize()\n\nCopy Back:\n  cudaMemcpy(h_C, d_C, M*N*sizeof(float), cudaMemcpyDeviceToHost)\n\nProfiling:\n  nsys profile ./matmul          вҶҗ Nsight Systems (timeline)\n  ncu --metrics ... ./matmul     вҶҗ Nsight Compute (kernel deep dive)\n  Check: memory throughput, achieved occupancy, warp efficiency\n```\n\n---\n\n## Project 3 вҖ” Softmax Kernel Optimization\n\n### The Three-Stage Evolution\n\n```\nSTAGE 1: NAIVE (Numerically Unstable)\n  out[i] = exp(x[i]) / sum_j(exp(x[j]))\n  Problem: exp(x[i]) вҶ’ вҲһ for x[i] > 88 (FP32 overflow)\n\nSTAGE 2: NUMERICALLY STABLE (3-pass)\n  m = max(x)                          [pass 1: find max]\n  s = sum(exp(x[i] - m))              [pass 2: shifted sum]\n  out[i] = exp(x[i] - m) / s         [pass 3: normalize]\n  Safe because exp(x[i] - m) вүӨ exp(0) = 1\n\nSTAGE 3: ONLINE SOFTMAX (2-pass вҶ’ fused)\n  Maintain running (max, normalizer) in single pass:\n  \n  m = -вҲһ, d = 0.0\n  for each x[i]:\n      m_prev = m\n      m = max(m, x[i])\n      d = d * exp(m_prev - m) + exp(x[i] - m)\n      в”—в”Ғ rescale old sum when max updates в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”ӣ\n  \n  out[i] = exp(x[i] - m) / d\n  \n  Why this works: invariant that d = ОЈexp(x[j]-m) for j seen so far\n```\n\n### CUDA Kernel Design\n\n```\nEach CUDA thread block handles one softmax row (one sequence position)\n\nWARP-LEVEL REDUCTION:\n  // 32 threads in a warp reduce together\n  // Find max across warp\n  for (int mask = 16; mask > 0; mask >>= 1)\n      val = max(val, __shfl_xor_sync(0xffffffff, val, mask));\n  \n  // Sum across warp (after subtracting max)\n  for (int mask = 16; mask > 0; mask >>= 1)\n      sum += __shfl_xor_sync(0xffffffff, sum, mask);\n  \n  // Normalize\n  out[tid] = exp(x[tid] - warp_max) / warp_sum;\n\nMEMORY LAYOUT:\n  Input:  [batch, heads, seq_len, seq_len]  (attention scores)\n  Each thread block: one (b, h, i) row вҶ’ processes seq_len elements\n  Vectorized load: float4 вҶ’ process 4 elements per thread per load\n\nFUSION WITH ATTENTION:\n  Instead of: MatMul вҶ’ store вҶ’ Softmax вҶ’ store вҶ’ MatMul\n  Do:         MatMul + Softmax + MatMul in one kernel pass (Flash Attention)\n  Eliminates 2 HBM round-trips per layer\n```\n\n### Performance Targets\n\n| Implementation | Throughput | HBM Reads |\n|----------------|-----------|-----------|\n| Naive 3-pass | baseline | 3Г— seq_len |\n| Online 2-pass | 1.5Г— | 2Г— seq_len |\n| Fused warp reduction | 3Г— | 1Г— seq_len |\n| Flash Attention fused | 10Г—+ | O(1) per tile |\n\n---\n\n## Project 4 вҖ” Transformer from Scratch\n\n### Full Architecture\n\n```\nINPUT\n  token_ids: (B, T)   вҶҗ B=batch, T=sequence length\n\nEMBEDDING LAYER\n  tok_emb = Embedding(vocab_size, d_model)   вҶ’ (B, T, d_model)\n  pos_emb = Embedding(max_seq_len, d_model)  вҶ’ (T, d_model)   [learned]\n     OR\n  pos_enc = sinusoidal:\n    PE[pos, 2i]   = sin(pos / 10000^(2i/d_model))\n    PE[pos, 2i+1] = cos(pos / 10000^(2i/d_model))\n  \n  x = tok_emb + pos_emb    вҶ’ (B, T, d_model)\n  x = Dropout(x)\n\nTRANSFORMER BLOCK Г— N_layers\n  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n  в”Ӯ  [Pre-LayerNorm]                                   в”Ӯ\n  в”Ӯ  x_norm = LayerNorm(x)                             в”Ӯ\n  в”Ӯ                                                    в”Ӯ\n  в”Ӯ  [Multi-Head Self-Attention]                       в”Ӯ\n  в”Ӯ  Q = x_norm @ W_Q    (d_model вҶ’ d_model)          в”Ӯ\n  в”Ӯ  K = x_norm @ W_K                                  в”Ӯ\n  в”Ӯ  V = x_norm @ W_V                                  в”Ӯ\n  в”Ӯ                                                    в”Ӯ\n  в”Ӯ  Reshape: (B, T, d_model) вҶ’ (B, n_heads, T, d_k) в”Ӯ\n  в”Ӯ  d_k = d_model / n_heads                           в”Ӯ\n  в”Ӯ                                                    в”Ӯ\n  в”Ӯ  scores = Q @ K^T / sqrt(d_k)   вҶ’ (B, H, T, T)   в”Ӯ\n  в”Ӯ  mask:  upper triangle = -вҲһ (causal/autoregressive)в”Ӯ\n  в”Ӯ  attn = softmax(scores)         вҶ’ (B, H, T, T)    в”Ӯ\n  в”Ӯ  attn = Dropout(attn)                              в”Ӯ\n  в”Ӯ  out  = attn @ V                вҶ’ (B, H, T, d_k)  в”Ӯ\n  в”Ӯ  out  = reshape + W_O           вҶ’ (B, T, d_model) в”Ӯ\n  в”Ӯ                                                    в”Ӯ\n  в”Ӯ  x = x + Dropout(out)   вҶҗ residual connection     в”Ӯ\n  в”Ӯ                                                    в”Ӯ\n  в”Ӯ  [FFN]                                             в”Ӯ\n  в”Ӯ  x_norm2 = LayerNorm(x)                            в”Ӯ\n  в”Ӯ  ffn = Linear(d_model, 4*d_model)                  в”Ӯ\n  в”Ӯ  ffn = GELU(ffn)                                   в”Ӯ\n  в”Ӯ  ffn = Linear(4*d_model, d_model)                  в”Ӯ\n  в”Ӯ  ffn = Dropout(ffn)                                в”Ӯ\n  в”Ӯ  x = x + ffn            вҶҗ residual connection     в”Ӯ\n  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nFINAL HEAD\n  x = LayerNorm(x)\n  logits = Linear(d_model, vocab_size)   вҶ’ (B, T, vocab_size)\n\nLOSS (next-token prediction)\n  targets = token_ids shifted left by 1\n  loss = CrossEntropy(logits.view(-1, vocab_size), targets.view(-1))\n```\n\n### Hyperparameters (GPT-2 Small Scale)\n\n| Param | Value |\n|-------|-------|\n| d_model | 768 |\n| n_heads | 12 |\n| n_layers | 12 |\n| d_ff | 3072 |\n| vocab_size | 50257 |\n| max_seq_len | 1024 |\n| dropout | 0.1 |\n\n### Training Loop\n\n```python\nmodel = Transformer(config).to(device)\noptimizer = torch.optim.AdamW(\n    model.parameters(), \n    lr=3e-4, betas=(0.9, 0.95), \n    weight_decay=0.1\n)\n\n# Cosine LR schedule with linear warmup\nscheduler = CosineAnnealingLR(optimizer, T_max=max_steps)\n\nscaler = torch.cuda.amp.GradScaler()  # mixed precision\n\nfor step, (x, y) in enumerate(dataloader):\n    with torch.cuda.amp.autocast():\n        logits, loss = model(x, y)\n    \n    scaler.scale(loss).backward()\n    scaler.unscale_(optimizer)\n    torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n    scaler.step(optimizer)\n    scaler.update()\n    optimizer.zero_grad(set_to_none=True)\n    scheduler.step()\n```\n\n### Inference / Generation\n\n```python\n@torch.no_grad()\ndef generate(model, prompt_ids, max_new_tokens, temperature=1.0, top_k=50):\n    for _ in range(max_new_tokens):\n        # Crop context to max_seq_len\n        x = prompt_ids[:, -max_seq_len:]\n        logits = model(x)[:, -1, :]         # last position only\n        logits = logits / temperature\n        # top-k sampling\n        v, _ = torch.topk(logits, top_k)\n        logits[logits < v[:, -1:]] = -float('Inf')\n        probs = F.softmax(logits, dim=-1)\n        next_tok = torch.multinomial(probs, num_samples=1)\n        prompt_ids = torch.cat([prompt_ids, next_tok], dim=1)\n    return prompt_ids\n```\n\n---\n\n## Project 5 вҖ” Flash Attention Kernel (CUDA)\n\n### The Core Problem\n\nStandard attention: `Attention(Q,K,V) = softmax(QK^T/вҲҡd) В· V`\n\n- QK^T has shape (N, N) вҖ” quadratic in sequence length\n- Must be **stored in HBM** for softmax then read back\n- Memory: O(NВІ), compute: O(NВІd)\n- For N=8192, d=128: 8192ВІ Г— 4 bytes = **256 MB per head per layer**\n\n### Flash Attention Solution\n\n**Insight**: Never materialize the full NГ—N attention matrix. Process it in tiles that fit in SRAM (on-chip, ~19 TB/s bandwidth).\n\n```\nTILING STRATEGY\n  Split Q into blocks of size Br rows\n  Split K,V into blocks of size Bc rows\n  Process each (Qi, Kj, Vj) combination\n\n  For each query block Qi:\n    Initialize: Oi = 0, в„“i = 0, mi = -вҲһ\n    \n    For each key/value block (Kj, Vj):\n      Load Qi, Kj, Vj from HBM вҶ’ SRAM\n      \n      Sij = Qi @ Kj^T / sqrt(d)     вҶҗ local attention scores\n      mМғij = rowmax(Sij)              вҶҗ local max\n      PМғij = exp(Sij - mМғij)          вҶҗ local softmax numerator\n      в„“Мғij = rowsum(PМғij)             вҶҗ local sum\n      \n      # Online softmax update (safe across tiles)\n      mi_new = max(mi, mМғij)\n      в„“i_new = exp(mi - mi_new) * в„“i + exp(mМғij - mi_new) * в„“Мғij\n      \n      # Rescale accumulated output and add new contribution\n      Oi = (exp(mi - mi_new) * в„“i * Oi + exp(mМғij - mi_new) * PМғij @ Vj) / в„“i_new\n      \n      mi, в„“i = mi_new, в„“i_new\n    \n    Write final Oi вҶ’ HBM\n    Store (в„“i, mi) вҶ’ HBM for backward pass\n```\n\n### SRAM Tile Size Calculation\n\n```\nSRAM budget: 48 KB (typical for shared mem per block)\nd = head_dim = 128\n\nTile holds: Qi (BrГ—d), Kj (BcГ—d), Vj (BcГ—d) in FP16\nMemory: 2 * (Br + 2*Bc) * d bytes\n\nSet Br = Bc = B:\n  2 * 3B * 128 = 768B bytes вүӨ 48,000 bytes\n  B вүӨ 62 вҶ’ use B = 64 (power of 2)\n```\n\n### Backward Pass (Recomputation)\n\n```\nDuring forward: store only (O, в„“, m) вҖ” NOT the NГ—N attention matrix\nDuring backward:\n  Recompute Sij, Pij from stored Q, K, V, (в„“, m)\n  Compute dV, dK, dQ using recomputed values\n  \nMemory for backward: O(N) instead of O(NВІ)\nCompute overhead: ~33% more FLOPs (recomputation)\nNet result: dramatically faster due to I/O reduction\n```\n\n### Performance Comparison\n\n```\nSequence Length N = 2048, d = 64, Batch = 8, Heads = 12:\n\nStandard Attention:\n  HBM reads:  QKV load + attn matrix write/read = 9 * N*d * 2 bytes = 4.7 GB\n  HBM writes: attn matrix = NВІ*B*H * 2 bytes   = 3.2 GB\n  Total: ~8 GB of HBM traffic per forward pass\n\nFlash Attention:\n  HBM reads:  QKV load = 3 * N*d*B*H * 2 bytes = 4.7 GB\n  HBM writes: O = N*d*B*H * 2 bytes             = 1.6 GB\n  Total: ~6.3 GB вҖ” but with NO NВІ term\n  At N=8192: 10-20x less HBM traffic\n\nWall-clock speedup: 2-4x on A100 (memory bandwidth bound)\n```\n\n---\n\n## Project 6 вҖ” Vision Transformer (ViT)\n\n### Architecture\n\n```\nINPUT IMAGE: (B, 3, H, W) = (B, 3, 224, 224)\n\nPATCH EMBEDDING\n  Divide image into PГ—P non-overlapping patches\n  P=16 вҶ’ (224/16)ВІ = 196 patches per image\n  \n  Each patch: (3, 16, 16) вҶ’ flatten вҶ’ 768-dim vector via linear layer\n  Implementation: Conv2d(3, d_model, kernel_size=P, stride=P)\n                  вҶ’ same as linear projection of flattened patches\n  \n  Add [CLS] token (learnable) prepended вҶ’ seq_len = 197\n  Add positional embeddings (learnable, shape 197Г—768)\n  \n  x: (B, 197, 768)\n\nTRANSFORMER ENCODER Г— 12 layers\n  Same as language transformer EXCEPT:\n  - No causal mask (bidirectional attention)\n  - [CLS] token attends to all patches; patches attend to each other\n  \n  MSA (Multi-head Self-Attention):\n    Q, K, V projections (768 вҶ’ 768)\n    12 heads, d_k = 64\n    scores = QK^T / 8.0 (= вҲҡ64)\n    attn = softmax(scores)   вҶҗ no mask\n    out = attn @ V вҶ’ project back\n  \n  MLP block:\n    GELU activation (not ReLU)\n    Expansion: 768 вҶ’ 3072 вҶ’ 768\n\nCLASSIFICATION HEAD\n  Take [CLS] token output: (B, 768)\n  LayerNorm вҶ’ Linear(768, num_classes)\n  вҶ’ Softmax вҶ’ class probabilities\n\nFULL FORWARD:\n  (B,3,224,224) вҶ’ PatchEmbed вҶ’ (B,197,768) вҶ’ TransformerBlocks Г— 12\n               вҶ’ CLS extract вҶ’ (B,768) вҶ’ MLP Head вҶ’ (B,1000)\n```\n\n### Pretraining Strategies\n\n```\n1. SUPERVISED (original ViT paper)\n   Train directly on ImageNet-21k (14M images) then fine-tune on IN-1k\n   Requires large data вҖ” ViT underperforms CNNs on small datasets\n   \n2. MAE (Masked Autoencoders, He et al 2021)\n   Mask 75% of patches at random\n   Encoder processes only visible patches (fast вҖ” 4Г— fewer tokens)\n   Decoder (lighter) reconstructs masked patches in pixel space\n   Loss: MSE on masked patches only\n   \n   Masking strategies: random, block, grid\n   Key insight: image reconstruction is harder than it seems вҶ’ good features\n   \n3. DINO (Self-supervised)\n   Student network sees augmented view A\n   Teacher network (EMA of student) sees augmented view B\n   Minimize cross-entropy between student/teacher CLS token distributions\n   Teacher never trained directly вҖ” only updated via:\n     Оё_teacher = 0.996 * Оё_teacher + 0.004 * Оё_student\n```\n\n### Fine-tuning Protocol\n\n```\nPretrained ViT-B/16 (ImageNet-21k) вҶ’ Fine-tune on target dataset\n\nSettings:\n  lr = 3e-3 (higher than training from scratch)\n  weight_decay = 0.01\n  batch_size = 512\n  Augmentation: RandAugment(num_ops=2, magnitude=9)\n                Mixup(alpha=0.2), CutMix(alpha=1.0)\n                Random erase probability = 0.25\n  \n  Interpolate positional embeddings if changing resolution\n  (bicubic interpolation of pretrained pos_emb grid)\n```\n\n---\n\n## Project 7 вҖ” Diffusion Model (UNet + Scheduler)\n\n### High-Level Intuition\n\nLearn to reverse a gradual noising process. Training: corrupt data with noise, predict the noise. Inference: start from pure noise, iteratively denoise.\n\n### Forward Process (Fixed вҖ” No Learned Parameters)\n\n```\nNOISE SCHEDULE\n  ОІвӮҒ, ОІвӮӮ, ..., ОІ_T = linear schedule from 1e-4 to 0.02 (T=1000)\n  Оұt = 1 - ОІt\n  бҫұt = вҲҸ(ОұвӮҒ В· ОұвӮӮ В· ... В· Оұt)   вҶҗ cumulative product\n\nCLOSED-FORM NOISING (key property вҖ” skip to any timestep directly)\n  q(xt | xвӮҖ) = N(вҲҡбҫұt В· xвӮҖ,  (1 - бҫұt) В· I)\n  \n  Sample: xt = вҲҡбҫұt В· xвӮҖ + вҲҡ(1-бҫұt) В· Оө,   Оө ~ N(0,I)\n  \n  At t=0:  xt вүҲ xвӮҖ          (clean)\n  At t=T:  xt вүҲ Оө ~ N(0,I)  (pure noise)\n```\n\n### UNet Architecture\n\n```\nINPUT:  (B, C, H, W) = noisy image xt\n        + timestep t (encoded as sinusoidal embedding вҶ’ MLP вҶ’ vector)\nOUTPUT: (B, C, H, W) = predicted noise ОөМӮ\n\nENCODER (downsampling path)\n  Resolution: 256 вҶ’ 128 вҶ’ 64 вҶ’ 32 вҶ’ 16 вҶ’ 8\n  \n  At each resolution:\n    ResBlock Г— 2\n    AttentionBlock (at resolutions вүӨ 32)\n    Downsample: stride-2 Conv (or AvgPool + Conv)\n  \n  ResBlock:\n    GroupNorm вҶ’ SiLU вҶ’ Conv3Г—3\n    + time_emb projection (Linear вҶ’ SiLU вҶ’ Linear вҶ’ add)\n    GroupNorm вҶ’ SiLU вҶ’ Dropout вҶ’ Conv3Г—3\n    + residual (1Г—1 conv if channels change)\n\nBOTTLENECK\n  ResBlock вҶ’ AttentionBlock вҶ’ ResBlock\n  (operates at lowest spatial resolution)\n\nDECODER (upsampling path)  \n  At each resolution:\n    Upsample: bilinear or ConvTranspose2d\n    Concatenate skip connection from encoder (same resolution)\n    ResBlock Г— 2 (doubled channels due to skip)\n    AttentionBlock (at resolutions вүӨ 32)\n\nOUTPUT\n  GroupNorm вҶ’ SiLU вҶ’ Conv3Г—3(channels_out)\n  Output channels = input channels (predict noise ОөМӮ)\n\nCONDITIONING\n  Time:  sinusoidal embed(t) вҶ’ Linear(256, d_model) вҶ’ inject via scale+shift in GroupNorm\n  Class: learned class embedding вҶ’ add to time embedding\n  Text:  cross-attention in attention blocks (Q from image features, KV from text encoder)\n```\n\n### Training\n\n```python\nfor x0 in dataloader:                           # clean images (B, C, H, W)\n    t = torch.randint(0, T, (B,))               # random timestep per sample\n    Оө = torch.randn_like(x0)                    # random noise\n    \n    # Noise the image (closed form вҖ” no loop needed)\n    sqrt_alpha_bar = extract(sqrt_alphas_bar, t, x0.shape)\n    sqrt_one_minus = extract(sqrt_one_minus_alphas_bar, t, x0.shape)\n    xt = sqrt_alpha_bar * x0 + sqrt_one_minus * Оө\n    \n    # Predict noise\n    Оө_pred = unet(xt, t)\n    \n    # Simple MSE loss (from DDPM paper)\n    loss = F.mse_loss(Оө_pred, Оө)\n    \n    loss.backward()\n    optimizer.step()\n    optimizer.zero_grad()\n    \n    # EMA of weights for sampling\n    ema.update(unet)\n```\n\n### Inference вҖ” DDPM Sampler (1000 steps)\n\n```python\n@torch.no_grad()\ndef sample_ddpm(model, shape):\n    x = torch.randn(shape)                   # start from pure noise\n    \n    for t in reversed(range(T)):             # t: 999 вҶ’ 0\n        t_batch = torch.full((B,), t)\n        Оө_pred = model(x, t_batch)           # predict noise\n        \n        # Compute xвӮҖ prediction\n        x0_pred = (x - sqrt_one_minus_bar[t] * Оө_pred) / sqrt_bar[t]\n        x0_pred = x0_pred.clamp(-1, 1)       # clip to valid image range\n        \n        # Posterior mean\n        mu = posterior_mean_coef1[t] * x0_pred + posterior_mean_coef2[t] * x\n        \n        if t > 0:\n            Пғ = posterior_variance[t] ** 0.5\n            x = mu + Пғ * torch.randn_like(x) # add noise (except final step)\n        else:\n            x = mu\n    \n    return x   # (B, C, H, W) generated images\n```\n\n### Inference вҖ” DDIM Sampler (50 steps, deterministic)\n\n```python\n@torch.no_grad()\ndef sample_ddim(model, shape, steps=50, eta=0.0):\n    # Select subset of timesteps (strided)\n    timesteps = torch.linspace(T-1, 0, steps).long()\n    x = torch.randn(shape)\n    \n    for i, t in enumerate(timesteps):\n        Оө_pred = model(x, t)\n        \n        # DDIM step (deterministic when eta=0)\n        x0_pred = (x - sqrt_one_minus_bar[t] * Оө_pred) / sqrt_bar[t]\n        \n        if i < len(timesteps) - 1:\n            t_prev = timesteps[i+1]\n            x = sqrt_bar[t_prev] * x0_pred + sqrt_one_minus_bar[t_prev] * Оө_pred\n            # eta > 0 adds stochasticity back (DDIM вҶ’ DDPM as eta вҶ’ 1)\n        else:\n            x = x0_pred\n    return x\n```\n\n### Latent Diffusion (Stable Diffusion Extension)\n\n```\nVAE ENCODER  вҶ’  latent z (8Г— smaller)  вҶ’  DIFFUSION IN LATENT SPACE  вҶ’  VAE DECODER  вҶ’  image\n \nBenefit: 64Г—64 latents instead of 512Г—512 pixels\n         UNet processes 64Г—64 вҖ” 64Г— fewer elements\n         8Г— compression ratio in each spatial dimension\n\nText conditioning:\n  CLIP/T5 text encoder вҶ’ text embeddings (77, 768)\n  Cross-attention in UNet decoder: Q=image_features, KV=text_embeddings\n  Classifier-Free Guidance:\n    Оө_guided = Оө_uncond + w * (Оө_cond - Оө_uncond)\n    w=7.5 typical вҖ” trades diversity for prompt adherence\n```\n\n---\n\n## How These 7 Projects Form One System\n\n```\n                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                    в”Ӯ           MINI PYTORCH               в”Ӯ\n                    в”Ӯ                                     в”Ӯ\n  Autograd     в”Җв”Җв–¶  в”Ӯ  Gradient computation engine        в”Ӯ\n  MatMul kernel в”Җв”Җв–¶ в”Ӯ  GPU compute primitive               в”Ӯ\n  Softmax kernel в”Җв–¶ в”Ӯ  Numerical stability + fusion        в”Ӯ\n  Transformer в”Җв”Җв–¶   в”Ӯ  Core architecture                   в”Ӯ\n  Flash Attention в–¶ в”Ӯ  Memory-efficient attention          в”Ӯ\n  ViT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶   в”Ӯ  Extends to vision                   в”Ӯ\n  Diffusion в”Җв”Җв”Җв”Җв–¶   в”Ӯ  Extends to generation               в”Ӯ\n                    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nDependency graph:\n  Autograd\n    в””в”Җв–¶ Transformer\n          в”ңв”Җв–¶ Flash Attention (makes Transformer fast)\n          в”ңв”Җв–¶ ViT (swaps token embeddings for patch embeddings)\n          в””в”Җв–¶ Diffusion (UNet uses ResBlocks + Transformer attention blocks)\n  \n  MatMul kernel\n    в””в”Җв–¶ Softmax kernel (both are inner loops of attention)\n          в””в”Җв–¶ Flash Attention (fuses them)\n```\n"}, {"title": "Mini vLLM", "subtitle": "Inference Server В· KV Cache В· Speculative Decoding В· Quantization В· Continuous Batching", "icon": "вҡЎ", "content": "# Mini vLLM вҖ” E2E Architecture Reference\n> Projects: Inference Server (C++/Rust) В· KV Cache Paging System В· Speculative Decoding В· Quantization Library (Int8/FP4) В· Continuous Batching\n\n---\n\n## What You're Building\n\nThe serving stack that takes a trained model and makes it run efficiently in production. This is what separates a model that runs on one GPU for one user from a system that serves thousands of concurrent requests, maximizing GPU utilization while minimizing latency. After completing this system you will understand every design decision behind vLLM, TensorRT-LLM, and TGI.\n\n---\n\n## Project 1 вҖ” Inference Server (C++/Rust)\n\n### Full System Architecture\n\n```\n                         в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                         в”Ӯ           INFERENCE SERVER            в”Ӯ\n                         в”Ӯ                                      в”Ӯ\n  Client в”Җв”ҖHTTP/gRPCв”Җв”Җв–¶  в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                    в”Ӯ\n                         в”Ӯ  в”Ӯ  API Layer  в”Ӯ  /v1/completions    в”Ӯ\n                         в”Ӯ  в”Ӯ  (REST/gRPC)в”Ӯ  /v1/chat           в”Ӯ\n                         в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  /v1/embeddings     в”Ӯ\n                         в”Ӯ         в”Ӯ                            в”Ӯ\n                         в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ӯ\n                         в”Ӯ  в”Ӯ        Request Queue            в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ  Priority queue or FIFO         в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ  Fields per request:            в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ    - request_id (uuid)          в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ    - prompt_token_ids           в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ    - sampling_params            в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ    - max_new_tokens             в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ    - arrival_timestamp          в”Ӯ в”Ӯ\n                         в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в”Ӯ\n                         в”Ӯ         в”Ӯ                            в”Ӯ\n                         в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ӯ\n                         в”Ӯ  в”Ӯ        Scheduler                в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ  Continuous batching engine     в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ  - Groups prefill + decode      в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ  - Preemption on OOM            в”Ӯ в”Ӯ\n                         в”Ӯ  в”Ӯ  - Budget: max_batch_tokens     в”Ӯ в”Ӯ\n                         в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в”Ӯ\n                         в”Ӯ         в”Ӯ                            в”Ӯ\n                         в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\n                         в”Ӯ  в”Ӯ     KV Cache Manager          в”Ӯ  в”Ӯ\n                         в”Ӯ  в”Ӯ  Page allocation/deallocation  в”Ӯ  в”Ӯ\n                         в”Ӯ  в”Ӯ  Prefix cache lookup           в”Ӯ  в”Ӯ\n                         в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\n                         в”Ӯ         в”Ӯ                            в”Ӯ\n                         в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\n                         в”Ӯ  в”Ӯ       Model Runner            в”Ӯ  в”Ӯ\n                         в”Ӯ  в”Ӯ  CUDA kernel dispatch          в”Ӯ  в”Ӯ\n                         в”Ӯ  в”Ӯ  Prefill + Decode batches      в”Ӯ  в”Ӯ\n                         в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\n                         в”Ӯ         в”Ӯ                            в”Ӯ\n                         в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\n                         в”Ӯ  в”Ӯ       Sampler                  в”Ӯ  в”Ӯ\n                         в”Ӯ  в”Ӯ  temp / top-p / top-k / rep   в”Ӯ  в”Ӯ\n                         в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\n                         в”Ӯ         в”Ӯ                            в”Ӯ\n                         в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\n                         в”Ӯ  в”Ӯ     Detokenizer               в”Ӯ  в”Ӯ\n                         в”Ӯ  в”Ӯ  BPE decode вҶ’ UTF-8           в”Ӯ  в”Ӯ\n                         в”Ӯ  в”Ӯ  Streaming via SSE             в”Ӯ  в”Ӯ\n                         в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\n                         в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### Threading Model (C++)\n\n```cpp\n// Main thread: HTTP server\nauto server = httplib::Server();\nserver.Post(\"/v1/completions\", [&](const Request& req, Response& res) {\n    auto r = parse_request(req.body);\n    r.id = generate_uuid();\n    request_queue.push(r);\n    // Wait on promise/future for response\n    auto result = r.promise.get_future().get();\n    res.set_content(result.to_json(), \"application/json\");\n});\n\n// Scheduler thread: continuous batching loop\nvoid scheduler_loop() {\n    while (running) {\n        auto batch = scheduler.get_next_batch(request_queue, kv_cache_manager);\n        if (batch.empty()) { std::this_thread::sleep_for(1ms); continue; }\n        \n        auto outputs = model_runner.forward(batch);\n        sampler.sample(outputs, batch);\n        \n        for (auto& req : batch.finished_requests)\n            req.promise.set_value(req.output);\n        \n        scheduler.update(batch);  // update state, free completed requests\n    }\n}\n```\n\n### Request Lifecycle\n\n```\n1. ARRIVE\n   Client sends POST /v1/completions\n   Server validates, assigns request_id, enqueues\n\n2. WAIT IN QUEUE\n   Scheduler checks memory availability before admitting\n   If insufficient KV pages: request waits or lower-priority req preempted\n\n3. PREFILL (first forward pass)\n   All prompt tokens processed in PARALLEL\n   Fills KV cache for all prompt positions\n   Most compute-intensive step: O(prompt_lenВІ) attention\n\n4. DECODE (subsequent forward passes)\n   ONE token generated per forward pass\n   Uses cached K,V from previous positions\n   Appends new K,V to cache\n   Memory-bandwidth bound (reads weights + KV cache each step)\n\n5. SAMPLING\n   Logits (vocab_size) вҶ’ apply temperature/top-p вҶ’ sample token\n   Check stop conditions: max_tokens, stop strings, EOS token\n\n6. STREAM / RETURN\n   SSE: send token immediately as generated\n   Non-streaming: buffer all tokens, return when done\n   \n7. CLEANUP\n   Free KV cache pages\n   Decrement reference counts (prefix cache sharing)\n   Update metrics (tokens/sec, latency p50/p99/p999)\n```\n\n### Metrics & Observability\n\n```\nPrometheus metrics to expose:\n  - inference_requests_total (counter, by model/status)\n  - inference_tokens_per_second (gauge)\n  - kv_cache_utilization (gauge, 0-1)\n  - request_queue_depth (gauge)\n  - time_to_first_token_seconds (histogram)\n  - inter_token_latency_seconds (histogram)\n  - batch_size (histogram)\n  \nLogging: structured JSON logs per request\n  { request_id, prompt_tokens, completion_tokens, latency_ms, model }\n```\n\n---\n\n## Project 2 вҖ” KV Cache Paging System (like vLLM)\n\n### The Problem\n\n```\nNAIVE APPROACH\n  Pre-allocate KV buffer: (max_seq_len, d_model) per request\n  For max_seq_len=2048, d=4096, 32 layers, FP16:\n    2048 * 4096 * 2 * 32 * 2 bytes = 1 GB per request\n  8x A100 (640 GB total) вҶ’ ~640 concurrent requests MAX\n  \n  Reality: average output < 200 tokens вҶ’ 90% of allocation wasted\n  Memory fragmentation prevents packing more requests\n\nPAGED ATTENTION SOLUTION\n  Manage KV memory like OS manages RAM:\n    Physical memory = fixed-size pages (blocks)\n    Virtual memory  = logical view per request\n    Page table      = mapping logical вҶ’ physical blocks\n```\n\n### Memory Layout\n\n```\nPHYSICAL BLOCK POOL (GPU HBM)\n  Total HBM:       80 GB (A100)\n  Model weights:   ~14 GB (7B param FP16)\n  Activation mem:  ~4 GB (batch processing)\n  KV Cache Pool:   ~60 GB available\n  \n  Block size:      16 tokens\n  Per-block size:  2 (K+V) Г— d_kv Г— n_layers Г— dtype_size\n                   = 2 Г— 128 Г— 32 Г— 2 = 16 KB per block\n  Total blocks:    60 GB / 16 KB = ~3.8M blocks\n  \nBLOCK STRUCTURE (in GPU memory)\n  block[b].key   = float16[n_layers, n_heads, BLOCK_SIZE, d_head]\n  block[b].value = float16[n_layers, n_heads, BLOCK_SIZE, d_head]\n  \n  Alternatively flat: block[b] = float16[2, n_layers, n_heads, BLOCK_SIZE, d_head]\n```\n\n### Block Manager (CPU-side)\n\n```python\nclass BlockManager:\n    def __init__(self, n_blocks, block_size):\n        self.n_blocks = n_blocks\n        self.block_size = block_size\n        self.free_blocks = deque(range(n_blocks))  # block_ids\n        self.ref_count = [0] * n_blocks\n        self.prefix_cache = {}    # hash(tokens) вҶ’ block_id\n    \n    def allocate(self, n_tokens: int) -> List[int]:\n        \"\"\"Allocate physical blocks for n_tokens.\"\"\"\n        n_blocks = ceil(n_tokens / self.block_size)\n        if len(self.free_blocks) < n_blocks:\n            raise OOMError(\"Insufficient KV cache pages\")\n        \n        allocated = []\n        for _ in range(n_blocks):\n            block_id = self.free_blocks.popleft()\n            self.ref_count[block_id] = 1\n            allocated.append(block_id)\n        return allocated\n    \n    def free(self, block_table: List[int]):\n        \"\"\"Release blocks back to pool.\"\"\"\n        for block_id in block_table:\n            self.ref_count[block_id] -= 1\n            if self.ref_count[block_id] == 0:\n                self.free_blocks.append(block_id)\n    \n    def fork(self, block_table: List[int]) -> List[int]:\n        \"\"\"Copy-on-write fork (for beam search / prefix sharing).\"\"\"\n        new_table = block_table.copy()\n        for block_id in new_table:\n            self.ref_count[block_id] += 1\n        return new_table\n    \n    def get_or_cache_prefix(self, tokens: List[int]) -> Optional[List[int]]:\n        \"\"\"Return cached blocks for a prompt prefix if available.\"\"\"\n        for length in range(len(tokens), 0, -self.block_size):\n            prefix = tokens[:length]\n            key = hash(tuple(prefix))\n            if key in self.prefix_cache:\n                cached_blocks = self.prefix_cache[key]\n                # Increment ref counts (shared ownership)\n                for b in cached_blocks:\n                    self.ref_count[b] += 1\n                return cached_blocks, length  # blocks + how many tokens covered\n        return None, 0\n```\n\n### Paged Attention CUDA Kernel\n\n```\nStandard attention reads K,V from contiguous tensors:\n  K: [batch, heads, seq_len, d_head]  вҶҗ contiguous\n\nPaged attention reads K,V via indirection through block table:\n  block_table: [batch, max_blocks_per_seq]  вҶҗ CPU-provided mapping\n  \nKernel pseudocode:\n  For each query position (batch b, head h, seq position q):\n    acc = 0.0\n    for logical_block = 0 to num_blocks:\n      phys_block = block_table[b, logical_block]\n      for slot = 0 to BLOCK_SIZE:\n          k = K_cache[phys_block, h, slot, :]\n          v = V_cache[phys_block, h, slot, :]\n          score = dot(q_vec, k) / sqrt(d_head)\n          acc += softmax_weight * v\n    output[b, h, q, :] = acc\n\nMemory access pattern: non-contiguous but coalesced within a block\nPerformance overhead vs contiguous: ~10-15% (acceptable for 3x+ capacity gain)\n```\n\n### Preemption Strategy\n\n```\nWHEN: new request admitted but KV cache runs OOM mid-generation\n\nOPTIONS:\n  1. SWAP to CPU RAM\n     - Copy physical blocks from GPU HBM вҶ’ CPU DRAM\n     - Resume later by swapping back\n     - Overhead: PCIe bandwidth (~32 GB/s) вҖ” slow\n  \n  2. RECOMPUTE (drop and restart)\n     - Free all blocks for the preempted request\n     - When rescheduled: re-run prefill from scratch\n     - Simpler to implement, works well for short prompts\n  \n  3. PARTIAL SWAP\n     - Keep recent blocks on GPU (needed for decode)\n     - Swap older/prefix blocks to CPU\n     - Best for long-context requests\n\nSCHEDULING POLICY:\n  Preempt request with lowest priority (FCFS: oldest completed most tokens)\n  Never preempt the same request twice in a row (livelock prevention)\n```\n\n---\n\n## Project 3 вҖ” Speculative Decoding System\n\n### Core Algorithm\n\n```\nPROBLEM: LLM decode is 1 token/forward-pass вҖ” memory BW bound\n         Target model (7B) runs at ~50 tokens/sec on A100\n         \nINSIGHT: GPU can run one 7B forward pass OR seven 7B forward passes\n         in nearly the same wall-clock time (latency bound, not throughput)\n         \n         Instead: draft K tokens with tiny model, verify ALL in one pass\n\n                Draft Model         Target Model\n                (68M params)        (7B params)\n                в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ        в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n  Step 1:       [fast, K tokens]    [idle]\n  Step 2:       [idle]              [verify K+1 positions in one pass]\n  Step 3:       accept/reject each draft token\n  \n  If all K accepted вҶ’ K+1 tokens generated in cost of 1 target forward pass\n  If first token rejected вҶ’ 1 token, discard rest\n  Average speedup: 2-3x depending on task/acceptance rate\n```\n\n### Full Algorithm (Speculative Sampling)\n\n```python\ndef speculative_decode(\n    target_model, draft_model, context, max_tokens, K=5\n):\n    output = context.copy()\n    \n    while len(output) - len(context) < max_tokens:\n        # в”Җв”Җв”Җ DRAFT PHASE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n        draft_tokens = []\n        draft_probs  = []\n        \n        draft_input = output.copy()\n        for _ in range(K):\n            logits = draft_model.forward(draft_input)\n            probs = softmax(logits[-1])           # last position\n            token = sample(probs)                  # draft sample\n            draft_tokens.append(token)\n            draft_probs.append(probs[token])\n            draft_input.append(token)\n        \n        # в”Җв”Җв”Җ VERIFY PHASE (ONE TARGET FORWARD PASS) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n        # Process output + all K draft tokens simultaneously\n        target_logits = target_model.forward(output + draft_tokens)\n        # target_logits has shape (K+1, vocab_size)\n        # position i gives distribution over token at position len(output)+i\n        \n        # в”Җв”Җв”Җ ACCEPTANCE SAMPLING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n        n_accepted = 0\n        for i in range(K):\n            target_p = softmax(target_logits[i])[draft_tokens[i]]\n            draft_p  = draft_probs[i]\n            \n            r = random.uniform(0, 1)\n            if r < min(1.0, target_p / draft_p):    # accept\n                output.append(draft_tokens[i])\n                n_accepted += 1\n            else:                                     # reject\n                # Sample from adjusted distribution\n                # p_adjusted[x] = max(0, target_p[x] - draft_p[x]) / Z\n                adj_probs = relu(softmax(target_logits[i]) - draft_probs_full[i])\n                adj_probs /= adj_probs.sum()\n                output.append(sample(adj_probs))\n                break\n        else:\n            # All K accepted! Sample bonus token from final target position\n            output.append(sample(softmax(target_logits[K])))\n        \n        n_accepted += 1  # always get at least 1 token\n    \n    return output\n\n# Key properties:\n# - Provably identical distribution to running target model alone\n# - Expected tokens per iteration = K * acceptance_rate + 1\n# - No quality degradation, only speed change\n```\n\n### Draft Model Selection\n\n```\nREQUIREMENTS:\n  - Same tokenizer as target (identical vocabulary essential)\n  - Much smaller (5-10x fewer params) for speed benefit\n  - Similar distribution to target (high acceptance rate)\n\nSTRATEGIES:\n\n1. PURPOSE-TRAINED DRAFT\n   Distill from target model вҶ’ dedicated small model\n   Best acceptance rate (trained to match target exactly)\n   Example: Medusa (multi-head on target), EAGLE (feature-based draft)\n\n2. SAME-FAMILY SMALL MODEL  \n   Llama-3.1-8B draft вҶ’ Llama-3.1-70B target\n   Good acceptance for in-distribution text\n   Acceptance rate: 70-85% for typical generation tasks\n\n3. N-GRAM / RETRIEVAL DRAFT\n   For repetitive text (code completion, structured output)\n   Match recent context to generate candidates\n   Zero parameters, instant draft вҖ” but narrow applicability\n\n4. MEDUSA (multi-head speculative)\n   Attach K extra LM heads to target model\n   Each head predicts token at position +1, +2, ..., +K\n   Draft and verify in same forward pass (no separate model)\n   Verification uses tree attention to evaluate multiple token paths\n```\n\n### System Integration\n\n```\nMEMORY:\n  Draft model fits in same GPU (68M << 7B)\n  KV cache: maintain SEPARATE caches for draft and target\n  On rejection: rollback target KV cache to last accepted position\n  \n  Draft KV rollback: trivial (just reset position pointer)\n  Target KV rollback: must track position, truncate last K entries\n  \nBATCHING:\n  Speculative decoding is naturally sequential per request\n  Batch speculative: run draft for all requests, then batch verify with target\n  Complexity: accepted length varies per request вҶ’ variable-length batches\n  \nDYNAMIC K:\n  Adjust K based on observed acceptance rate:\n    acceptance_rate > 0.8 вҶ’ increase K\n    acceptance_rate < 0.5 вҶ’ decrease K\n  Track per-request or per-model exponential moving average\n```\n\n---\n\n## Project 4 вҖ” Quantization Library (Int8/FP4)\n\n### Why Quantization\n\n```\nLlama-3.1-70B weights:\n  FP32: 70B Г— 4 bytes = 280 GB  (requires 4Г— A100 just for weights)\n  BF16: 70B Г— 2 bytes = 140 GB\n  Int8: 70B Г— 1 byte  =  70 GB  вҶҗ fits in 1Г— H100 (80 GB)\n  FP4:  70B Г— 0.5 byte = 35 GB  вҶҗ fits in 1Г— A100 (40 GB)\n\nMemory bandwidth also reduced proportionally вҶ’ faster decode\n```\n\n### Post-Training Quantization (PTQ) Pipeline\n\n```\nINPUT:   Pre-trained FP32/BF16 model weights\nOUTPUT:  Quantized model + scale factors + zero points\n\nSTEP 1: Calibration\n  Run forward passes on ~512 calibration samples\n  Collect activation statistics: min, max, percentiles per layer\n  Important: outliers in activations (specific channels >> others)\n\nSTEP 2: Weight Quantization\n  For each weight tensor W of shape (out, in):\n  \n    Per-tensor (cheapest):\n      scale = max(|W|) / 127\n      W_q = round(W / scale).clamp(-128, 127).to(int8)\n      W_dq = W_q.float() * scale   # dequantized approximation\n    \n    Per-channel (better accuracy):\n      scale_per_row = max(|W|, dim=1) / 127  # shape: (out,)\n      W_q = round(W / scale_per_row[:, None]).clamp(-128, 127).to(int8)\n    \n    Per-group (best accuracy, ~4-8 tokens grouped):\n      group_size = 128\n      W reshaped: (out, in/128, 128)\n      scale per group\n\nSTEP 3: Activation Quantization (for Int8 GEMM)\n  Static: pre-computed scale from calibration data\n  Dynamic: compute scale at runtime from actual activation values\n    scale = max(|act|) / 127    (one pass over activation)\n    act_q = round(act / scale).clamp(-128, 127).to(int8)\n\nSTEP 4: Int8 GEMM\n  y = W_q @ x_q                 вҶҗ integer matrix multiply (fast)\n  y_float = y.float() * scale_W * scale_x   вҶҗ dequantize output\n```\n\n### GPTQ (Gradient-based PTQ, Weight-Only)\n\n```\nInsight: Minimizing per-layer output error is better than minimizing\n         weight quantization error directly\n\nAlgorithm (per linear layer):\n  for each column j in weight matrix W:\n      w_j = W[:, j]           # column to quantize\n      quant(w_j)               # quantize to Int4/Int8\n      error_j = w_j - dequant(quant(w_j))   # quantization error\n      \n      # Compensate remaining columns for this error\n      # using second-order information (Hessian of activation covariance)\n      W[:, j+1:] -= error_j @ H_inv[j, j+1:]\n      \n      # This is the \"lazy batch\" variant вҖ” update in groups of 128 cols\n  \nResult: quantized weights that minimize output error, not weight error\nLayer-wise: run GPTQ on each transformer layer sequentially\n\nQuality: FP16-comparable at Int4, with 4x memory reduction\nCost: ~1-4 GPU-hours for 7B model (one-time)\n```\n\n### FP4 (NF4 вҖ” NormalFloat4)\n\n```\nMOTIVATION: weights of quantized networks follow roughly normal distribution\n           вҶ’ allocate bits based on quantile positions, not linear range\n\nNF4 QUANTILE LEVELS (16 levels for 4 bits):\n  Compute 16 quantiles of N(0,1):\n  [-1.0, -0.6962, -0.5251, -0.3949, -0.2844, -0.1848, -0.0911, 0.0,\n    0.0911, 0.1848, 0.2844, 0.3949, 0.5251, 0.6962, 1.0, 1.0]\n  \n  These are equally-spaced PROBABILITY levels, not value levels\n\nQUANTIZATION:\n  Normalize weights: w_norm = w / max(|w|)\n  For each w_norm: find nearest NF4 level (index 0-15)\n  Store 4-bit index\n\nDEQUANTIZATION:\n  Look up NF4 table by index\n  Multiply by stored scale (max absolute value)\n\nDOUBLE QUANTIZATION (QLoRA trick):\n  Scale factors themselves are quantized (FP8)\n  Scale of scales: one FP32 value per group\n  Memory saving: 0.5 bits per parameter for scale storage\n\nBITSANDBYTES IMPLEMENTATION:\n  Uses block-wise quantization: 64-weight blocks\n  Each block has own scale factor\n  GPU kernel: blockwise_fp4_dequant_gemm\n```\n\n### Quantization-Aware Training (QAT)\n\n```\nIDEA: Simulate quantization during training so model learns to be robust\n\nFAKE QUANTIZE op (differentiable):\n  Forward:  x_q = round(x / scale) * scale   вҶҗ quantize + dequantize\n  Backward: pass-through (Straight-Through Estimator)\n            вҲӮL/вҲӮx = вҲӮL/вҲӮx_q  (ignore quantization in backward)\n\nTRAINING LOOP:\n  1. Initialize from FP32 pre-trained weights\n  2. Insert FakeQuantize nodes after linear layers\n  3. Fine-tune with small learning rate (1e-5 typical)\n  4. After training: extract quantized weights + scales\n\nRESULT: better accuracy than PTQ, but requires training data + compute\n```\n\n### Accuracy Recovery Techniques\n\n```\nPROBLEM: Quantization kills accuracy for certain layers\n\nLLM.int8() solution (Dettmers et al):\n  OBSERVATION: 0.1% of weight channels contain \"outliers\" (>>100x average)\n  SOLUTION: decompose matmul:\n    - 99.9% of columns вҶ’ Int8 quantization (fast)\n    - 0.1% outlier columns вҶ’ FP16 (keep full precision)\n    - Merge results\n\nSmoothQuant:\n  INSIGHT: activations are harder to quantize than weights (more outliers)\n  SOLUTION: mathematically transfer quantization difficulty from activations to weights\n    X_new = X / s              (easier to quantize activations)\n    W_new = W * s              (slightly harder to quantize weights)\n    XW = X_new * W_new        (same result)\n  where s is per-channel smoothing factor derived from activation stats\n```\n\n---\n\n## Project 5 вҖ” Continuous Batching\n\n### The Problem with Static Batching\n\n```\nSTATIC BATCHING (naive)\n  Collect B requests, run together, return when ALL finish\n  \n  Request 1: в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ (8 tokens)\n  Request 2: в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ (22 tokens)  \n  Request 3: в–Ҳв–Ҳв–Ҳв–Ҳ (4 tokens)\n  Request 4: в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ (14 tokens)\n  \n  All start together. All wait for Request 2 to finish.\n  GPU utilization during tail: 25% (only req 2 running)\n  \n  Batch throughput bottlenecked by longest request in batch.\n```\n\n### Continuous Batching Solution\n\n```\nCONTINUOUS BATCHING (iteration-level scheduling)\n  After each decode step: check if any request finished\n  If yes: evict finished request, admit new request from queue\n  \n  Timeline:\n  Step  1: [R1 R2 R3 R4] вҶҗ initial batch\n  Step  2: [R1 R2 R3 R4]\n  Step  4: [R1 R2 R3 R4] вҶҗ R3 finishes, R5 admitted\n  Step  5: [R1 R2 R5 R4]\n  Step  8: [R1 R2 R5 R4] вҶҗ R1 finishes, R6 admitted\n  Step  9: [R6 R2 R5 R4]\n  ...\n  \n  GPU always busy, no idle slots waiting for slow requests\n  Throughput improvement: 2-4x in practice\n```\n\n### Scheduler Implementation\n\n```python\nclass ContinuousBatchingScheduler:\n    def __init__(self, max_batch_tokens, kv_manager):\n        self.max_batch_tokens = max_batch_tokens  # budget\n        self.kv_manager = kv_manager\n        self.running: List[Request] = []          # currently decoding\n        self.waiting: Queue[Request] = Queue()    # admitted, waiting for KV\n        self.swapped: List[Request] = []          # preempted to CPU\n    \n    def schedule(self) -> SchedulerOutput:\n        # 1. Check finished requests\n        for req in self.running:\n            if req.is_done():\n                self.kv_manager.free(req.block_table)\n        self.running = [r for r in self.running if not r.is_done()]\n        \n        # 2. Try to resume swapped requests\n        while self.swapped and self._has_capacity():\n            req = self.swapped.pop(0)\n            self._swap_in(req)\n            self.running.append(req)\n        \n        # 3. Admit new requests from waiting queue\n        while not self.waiting.empty() and self._has_capacity():\n            req = self.waiting.get()\n            try:\n                blocks = self.kv_manager.allocate(len(req.prompt_tokens))\n                req.block_table = blocks\n                self.running.append(req)\n            except OOMError:\n                # Preempt lowest priority running request\n                victim = min(self.running, key=lambda r: r.priority)\n                self._swap_out(victim)\n                self.running.remove(victim)\n                self.swapped.append(victim)\n        \n        # 4. Construct batch\n        prefill_reqs = [r for r in self.running if r.phase == 'prefill']\n        decode_reqs  = [r for r in self.running if r.phase == 'decode']\n        \n        return SchedulerOutput(\n            prefill=prefill_reqs,\n            decode=decode_reqs,\n        )\n    \n    def _has_capacity(self) -> bool:\n        used_tokens = sum(len(r.token_ids) for r in self.running)\n        free_blocks = self.kv_manager.n_free_blocks()\n        return used_tokens < self.max_batch_tokens and free_blocks > MIN_FREE_BLOCKS\n```\n\n### Batching Prefill and Decode Together\n\n```\nCHALLENGE: Prefill processes N tokens in parallel; Decode processes 1 token.\n           They have fundamentally different compute profiles.\n\nCHUNKED PREFILL:\n  Long prompt would dominate a batch (thousands of tokens)\n  Solution: chunk prefill into pieces of max_chunk_size tokens\n  Interleave prefill chunks with decode steps\n  \n  Schedule iteration:\n    Decode batch: all running requests (1 token each)\n    Prefill batch: one chunk from the next waiting request\n    \n    Combined as single forward pass:\n    attention_mask handles that decode positions attend over full KV cache\n    while prefill chunk only attends over its own context\n\nSEPARATION (simpler):\n  Two forward passes per scheduler step:\n    1. Prefill forward: all new requests in parallel\n    2. Decode forward: all decoding requests\n  \n  Slightly less GPU utilization but simpler code\n```\n\n### Token Budget Management\n\n```\nBUDGET CONSTRAINT: max_tokens_per_batch = max_batch_tokens\n\nDecode batch:\n  Each request contributes exactly 1 input token\n  B decode requests вҶ’ B tokens of compute (cheap per request)\n  KV reads: B requests Г— seq_len Г— d_kv (dominant cost)\n\nPrefill batch:\n  New request contributes prompt_len tokens\n  10 requests of 200 tokens = 2000 tokens вҶ’ quadratic attention\n  \nDYNAMIC BUDGET:\n  Reserve 80% of budget for decode (maintain latency)\n  Use remaining 20% for prefill (admit new requests)\n  \n  decode_slots    = floor(0.8 * max_batch_tokens)\n  prefill_budget  = max_batch_tokens - actual_decode_tokens\n  admit_up_to = requests whose prompt_len fits in prefill_budget\n```\n\n---\n\n## How These 5 Projects Form One System\n\n```\n                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                    в”Ӯ              MINI vLLM                   в”Ӯ\n                    в”Ӯ                                          в”Ӯ\n                    в”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\n  Request в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶ в”Ӯ   в”Ӯ  Inference  в”Ӯв”Җв”Җв–¶в”Ӯ  Continuous    в”Ӯ  в”Ӯ\n                    в”Ӯ   в”Ӯ   Server    в”Ӯ   в”Ӯ  Batching      в”Ӯ  в”Ӯ\n                    в”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\n                    в”Ӯ                             в”Ӯ            в”Ӯ\n                    в”Ӯ                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ӯ\n                    в”Ӯ                    в”Ӯ   KV Cache     в”Ӯ   в”Ӯ\n                    в”Ӯ                    в”Ӯ   Paging       в”Ӯ   в”Ӯ\n                    в”Ӯ                    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в”Ӯ\n                    в”Ӯ                             в”Ӯ            в”Ӯ\n                    в”Ӯ          в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\n                    в”Ӯ          в”Ӯ  Quantized Model (Int8)   в”Ӯ  в”Ӯ\n                    в”Ӯ          в”Ӯ  + Speculative Decoding   в”Ӯ  в”Ӯ\n                    в”Ӯ          в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\n                    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nMemory hierarchy of a production serving system:\n  GPU SRAM (~50 MB):   Flash Attention tiles, active batch activations\n  GPU HBM (~80 GB):   Model weights (quantized) + KV cache (paged)\n  CPU DRAM (~512 GB): Swapped KV pages, request queue, tokenizer\n  SSD (~10 TB):       Model checkpoint, serving logs\n\nPerformance stack:\n  Quantization     вҶ’ 2-4x less memory вҶ’ more requests in GPU simultaneously\n  KV Paging        вҶ’ 3x better GPU memory utilization vs static allocation\n  Continuous Batch вҶ’ 2-4x throughput vs static batching\n  Speculative Dec  вҶ’ 2-3x latency reduction for individual requests\n  \n  Combined: production system serving 10-50x more requests/sec vs naive impl\n```\n"}, {"title": "Mini LangChain", "subtitle": "CoT Reasoner В· ReAct Agent В· RAG В· HNSW В· Function Calling В· Structured Output В· Graph RAG", "icon": "рҹ”—", "content": "# Mini LangChain вҖ” E2E Architecture Reference\n> Projects: Chain-of-Thought Reasoner В· ReAct Agent Loop В· RAG Pipeline В· Vector Database (HNSW) В· Function Calling Router В· Structured Output Parser В· Semantic Router В· Graph RAG В· Knowledge Graph Builder В· Code Interpreter Sandbox\n\n---\n\n## What You're Building\n\nThe application layer that makes LLMs useful: orchestrating reasoning, retrieval, tool use, and structured outputs. After completing this system you understand how every major agent framework works internally, why retrieval quality determines application quality, and how to route and constrain LLM outputs programmatically.\n\n---\n\n## Project 1 вҖ” Chain-of-Thought Reasoner\n\n### Architecture\n\n```\nSTANDARD PROMPTING\n  Prompt:   \"What is 17 Г— 23?\"\n  Output:   \"391\"\n  \n  Problem: Model pattern-matches, doesn't show work\n           Errors compound invisibly on multi-step problems\n\nCHAIN-OF-THOUGHT PROMPTING\n  Prompt:   \"What is 17 Г— 23? Think step by step.\"\n  Output:   \"17 Г— 23 = 17 Г— 20 + 17 Г— 3 = 340 + 51 = 391\"\n  \n  Performance improvement:\n    GSM8K (math): 18% вҶ’ 57% (GPT-3 scale)\n    MATH dataset: larger gains on harder problems\n    Works best at >100B params (emergent capability)\n```\n\n### Implementation Architecture\n\n```\nCoT SYSTEM ARCHITECTURE\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                    REASONER                                в”Ӯ\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  Input: question                                          в”Ӯ\nв”Ӯ         в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\nв”Ӯ         в”Ӯ        PROMPT BUILDER                        в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ                                              в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ  System: \"You are a careful reasoner.        в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ           Think step by step before          в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ           answering.\"                        в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ                                              в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ  Few-shot examples:                          в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ    Q: [example question]                     в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ    A: Let me think step by step.             в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ       [reasoning steps...]                   в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ       Therefore, the answer is [X].          в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ                                              в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ  Q: {question}                               в”Ӯ  в”Ӯ\nв”Ӯ         в”Ӯ  A: Let me think step by step.               в”Ӯ  в”Ӯ\nв”Ӯ         в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\nв”Ӯ                         в”Ӯ                                  в”Ӯ\nв”Ӯ                         в–ј                                  в”Ӯ\nв”Ӯ              в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                       в”Ӯ\nв”Ӯ              в”Ӯ      LLM API        в”Ӯ                       в”Ӯ\nв”Ӯ              в”Ӯ  temperature = 0.0  в”Ӯ вҶҗ deterministic      в”Ӯ\nв”Ӯ              в”Ӯ  stop = [\"Q:\"]      в”Ӯ вҶҗ stop before new Q  в”Ӯ\nв”Ӯ              в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                       в”Ӯ\nв”Ӯ                         в”Ӯ                                  в”Ӯ\nв”Ӯ                         в–ј                                  в”Ӯ\nв”Ӯ              в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                       в”Ӯ\nв”Ӯ              в”Ӯ   OUTPUT PARSER     в”Ӯ                       в”Ӯ\nв”Ӯ              в”Ӯ  Extract reasoning  в”Ӯ                       в”Ӯ\nв”Ӯ              в”Ӯ  Extract final ans  в”Ӯ                       в”Ӯ\nв”Ӯ              в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                       в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### CoT Variants\n\n```\nZERO-SHOT CoT\n  Simply append: \"Let's think step by step.\"\n  No examples needed. Surprisingly effective.\n  Best when: question domain is clear, model is large\n\nFEW-SHOT CoT\n  Provide 4-8 examples with explicit reasoning chains\n  Examples must match domain (math examples for math tasks)\n  Best when: specialized domain, consistent format needed\n\nSELF-CONSISTENCY CoT\n  Generate N reasoning paths (temperature > 0)\n  Final answer: majority vote across N outputs\n  N=40 paths typical. Trades compute for accuracy.\n  +3-5% accuracy over single chain\n\nPROGRAM-OF-THOUGHT (PoT)\n  Instead of natural language reasoning вҶ’ generate code\n  Execute code to get exact answer (no arithmetic errors)\n  for i, step in reasoning_steps:\n      # Each step is Python code\n      result = exec(step)\n  Especially powerful for math/computation\n\nTREE-OF-THOUGHTS (ToT)\n  Maintain beam of k partial reasoning pa
